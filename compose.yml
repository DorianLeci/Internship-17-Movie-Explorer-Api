services:
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web:/app
      - /app/node_modules

  backend:
    build:
      context: apps/backend
      dockerfile: Dockerfile

    environment:
      DATABASE_URL: 'postgresql://postgres:postgres@db:5432/Movies?schema=public'
      TMDB_API_ACCESS_TOKEN: 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI2YzM5MjcwMTRkNzljNTYyZTAyMGI2MzMzODFmNTgxMyIsIm5iZiI6MTc3MjEyMjEzNy4xOTkwMDAxLCJzdWIiOiI2OWEwNzAxOTllMTJkMWZhZjhlZmYzNmQiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.-psY37dApXAeWL0s3ags1t5zDds-RQQR9QxXkTKztZs'

    volumes:
      - ./apps/backend:/app
      - /app/node_modules

    ports:
      - '3000:3000'

    depends_on:
      - db

    networks:
      - backend_network

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Movies

    volumes:
      - db_data:/var/lib/postgresql/data

    networks:
      - backend_network

volumes:
  db_data:

networks:
  backend_network:
    driver: bridge
